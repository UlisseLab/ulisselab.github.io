{{- $team := hugo.Data.team.members -}} {{- $active := where $team "active" true
-}} {{- $inactive := where $team "active" false -}}

<div>
    <section>
        <h2>Active members</h2>
        <div
            class="tw:grid tw:md:grid-cols-3 tw:lg:grid-cols-4 tw:gap-4 tw:mt-4"
        >
            {{ range $active }} {{ partial "member.html" . }} {{ end }}
        </div>
    </section>

    <section class="tw:mt-8">
        <h2 class="tw:underline">Former members</h2>
        <div
            class="tw:grid tw:md:grid-cols-3 tw:lg:grid-cols-4 tw:gap-3 tw:mt-4"
        >
            {{ range $inactive }} {{ partial "member_small.html" . }} {{ end }}
        </div>
    </section>
</div>
